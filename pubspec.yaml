name: blah
description: Run multiple coding agent instances in parallel with git worktree isolation
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  xterm: ^4.0.0
  path_provider: ^2.1.0
  uuid: ^4.0.0
  file_selector: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: JetBrainsMono Nerd Font
      fonts:
        - asset: assets/fonts/JetBrainsMonoNerdFont-Regular.ttf
        - asset: assets/fonts/JetBrainsMonoNerdFont-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMonoNerdFont-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMonoNerdFont-Bold.ttf
          weight: 700
    - family: FiraCode Nerd Font
      fonts:
        - asset: assets/fonts/FiraCodeNerdFont-Regular.ttf
        - asset: assets/fonts/FiraCodeNerdFont-Medium.ttf
          weight: 500
        - asset: assets/fonts/FiraCodeNerdFont-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/FiraCodeNerdFont-Bold.ttf
          weight: 700